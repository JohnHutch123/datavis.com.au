<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Datavis</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .banner {
            background: white;
            padding: 60px 40px;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            text-align: center;
            max-width: 600px;
            width: 90%;
        }
        
        .banner h1 {
            font-size: 3.5em;
            color: #667eea;
            font-weight: 700;
            letter-spacing: 2px;
        }
        
        .banner p {
            font-size: 1.1em;
            color: #666;
            margin-top: 10px;
        }
        
        @media (max-width: 600px) {
            .banner h1 {
                font-size: 2.5em;
            }
            
            .banner {
                padding: 40px 20px;
            }
        }
    </style>
</head>
<body>
    <div class="banner">
        <h1>Datavis</h1>
        <p>Welcome</p>
    </div>
</body>
</html>
