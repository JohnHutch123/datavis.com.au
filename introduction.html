<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Datavis - Introduction</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        
        /* Hamburger Menu Styles */
        .navbar {
            background-color: rgba(0, 0, 0, 0.1);
            overflow: hidden;
            padding: 0;
            position: relative;
            backdrop-filter: blur(10px);
        }
        
        .navbar-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .navbar-title {
            color: white;
            font-size: 1.5em;
            font-weight: bold;
            letter-spacing: 1px;
        }
        
        .nav-menu {
            display: flex;
            list-style: none;
            gap: 0;
        }
        
        .nav-menu a {
            color: white;
            text-decoration: none;
            padding: 12px 20px;
            display: block;
            transition: background-color 0.3s;
        }
        
        .nav-menu a:hover {
            background-color: rgba(255, 255, 255, 0.2);
        }
        
        .hamburger {
            display: none;
            flex-direction: column;
            cursor: pointer;
            gap: 6px;
        }
        
        .hamburger span {
            width: 25px;
            height: 3px;
            background-color: white;
            border-radius: 3px;
            transition: 0.3s;
        }
        
        .hamburger.active span:nth-child(1) {
            transform: rotate(45deg) translate(10px, 10px);
        }
        
        .hamburger.active span:nth-child(2) {
            opacity: 0;
        }
        
        .hamburger.active span:nth-child(3) {
            transform: rotate(-45deg) translate(7px, -7px);
        }
        
        @media (max-width: 768px) {
            .hamburger {
                display: flex;
            }
            
            .nav-menu {
                position: absolute;
                top: 60px;
                left: 0;
                width: 100%;
                flex-direction: column;
                background-color: rgba(0, 0, 0, 0.3);
                max-height: 0;
                overflow: hidden;
                transition: max-height 0.3s;
            }
            
            .nav-menu.active {
                max-height: 200px;
            }
            
            .nav-menu a {
                padding: 15px 20px;
                border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            }
        }
        
        /* Page Content */
        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 40px 20px;
        }
        
        .page-content {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            overflow: hidden;
        }
        
        .banner-section {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 40px 30px;
            text-align: center;
            color: white;
            border-bottom: 3px solid #667eea;
        }
        
        .banner-section h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            letter-spacing: 2px;
        }
        
        .banner-input {
            width: 100%;
            max-width: 600px;
            padding: 12px;
            font-size: 1.1em;
            border: 2px solid white;
            border-radius: 5px;
            background-color: rgba(255, 255, 255, 0.9);
            color: #333;
            margin-top: 15px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        .banner-input:focus {
            outline: none;
            background-color: white;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.2);
        }
        
        .content-section {
            padding: 40px 30px;
        }
        
        .content-section h2 {
            color: #667eea;
            font-size: 1.8em;
            margin-bottom: 20px;
            letter-spacing: 1px;
        }
        
        .text-input-area {
            width: 100%;
            min-height: 300px;
            padding: 15px;
            font-size: 1em;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            resize: vertical;
            transition: border-color 0.3s;
        }
        
        .text-input-area:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 10px rgba(102, 126, 234, 0.2);
        }
        
        .button-group {
            margin-top: 20px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        .btn {
            padding: 12px 25px;
            font-size: 1em;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 600;
        }
        
        .btn-save {
            background-color: #667eea;
            color: white;
        }
        
        .btn-save:hover {
            background-color: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        
        .btn-clear {
            background-color: #ddd;
            color: #333;
        }
        
        .btn-clear:hover {
            background-color: #bbb;
            transform: translateY(-2px);
        }
        
        .save-message {
            display: none;
            margin-top: 15px;
            padding: 15px;
            background-color: #d4edda;
            color: #155724;
            border-radius: 5px;
            border: 1px solid #c3e6cb;
        }
        
        .save-message.show {
            display: block;
            animation: fadeInOut 3s;
        }
        
        @keyframes fadeInOut {
            0% { opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { opacity: 0; }
        }
        
        @media (max-width: 600px) {
            .banner-section h1 {
                font-size: 1.8em;
            }
            
            .content-section {
                padding: 20px 15px;
            }
            
            .text-input-area {
                min-height: 200px;
            }
        }
    </style>
</head>
<body>
    <!-- Navigation Bar -->
    <nav class="navbar">
        <div class="navbar-container">
            <div class="navbar-title">Datavis</div>
            <ul class="nav-menu" id="navMenu">
                <li><a href="index.html">Home</a></li>
                <li><a href="introduction.html">Introduction</a></li>
            </ul>
            <div class="hamburger" id="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
    </nav>
    
    <!-- Page Content -->
    <div class="container">
        <div class="page-content">
            <!-- Banner Section with Editable Header -->
            <div class="banner-section">
                <h1 id="bannerTitle">Introduction</h1>
                <input 
                    type="text" 
                    class="banner-input" 
                    id="bannerInput" 
                    placeholder="Edit banner title here..."
                    value="Introduction"
                >
            </div>
            
            <!-- Content Section with Text Area -->
            <div class="content-section">
                <h2>Content</h2>
                <textarea 
                    class="text-input-area" 
                    id="contentArea" 
                    placeholder="Enter your content here..."
                ></textarea>
                
                <div class="button-group">
                    <button class="btn btn-save" id="saveBtn">Save Content</button>
                    <button class="btn btn-clear" id="clearBtn">Clear</button>
                </div>
                
                <div class="save-message" id="saveMessage">
                    ✓ Content saved successfully!
                </div>
            </div>
        </div>
    </div>
    
    <script>
        // Hamburger Menu Toggle
        const hamburger = document.getElementById('hamburger');
        const navMenu = document.getElementById('navMenu');
        
        hamburger.addEventListener('click', () => {
            hamburger.classList.toggle('active');
            navMenu.classList.toggle('active');
        });
        
        // Close menu when a link is clicked
        const navLinks = navMenu.querySelectorAll('a');
        navLinks.forEach(link => {
            link.addEventListener('click', () => {
                hamburger.classList.remove('active');
                navMenu.classList.remove('active');
            });
        });
        
        // Banner Title Editing
        const bannerTitle = document.getElementById('bannerTitle');
        const bannerInput = document.getElementById('bannerInput');
        
        bannerInput.addEventListener('input', () => {
            bannerTitle.textContent = bannerInput.value || 'Introduction';
        });
        
        // Save Content
        const contentArea = document.getElementById('contentArea');
        const saveBtn = document.getElementById('saveBtn');
        const clearBtn = document.getElementById('clearBtn');
        const saveMessage = document.getElementById('saveMessage');
        
        // Load saved content from browser storage
        window.addEventListener('load', () => {
            const savedBanner = localStorage.getItem('bannerTitle');
            const savedContent = localStorage.getItem('pageContent');
            
            if (savedBanner) {
                bannerInput.value = savedBanner;
                bannerTitle.textContent = savedBanner;
            }
            if (savedContent) {
                contentArea.value = savedContent;
            }
        });
        
        saveBtn.addEventListener('click', () => {
            localStorage.setItem('bannerTitle', bannerInput.value);
            localStorage.setItem('pageContent', contentArea.value);
            
            saveMessage.classList.add('show');
            setTimeout(() => {
                saveMessage.classList.remove('show');
            }, 3000);
        });
        
        clearBtn.addEventListener('click', () => {
            if (confirm('Are you sure you want to clear all content?')) {
                contentArea.value = '';
                bannerInput.value = 'Introduction';
                bannerTitle.textContent = 'Introduction';
                localStorage.removeItem('pageContent');
                localStorage.removeItem('bannerTitle');
            }
        });
    </script>
</body>
</html>
