<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Datavis - Introduction</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            -webkit-user-select: none;
            user-select: none;
        }
        
        /* Hamburger Menu Styles */
        .navbar {
            background-color: rgba(0, 0, 0, 0.1);
            overflow: visible;
            padding: 0;
            position: relative;
            backdrop-filter: blur(10px);
            z-index: 1000;
        }
        
        .navbar-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .navbar-title {
            color: white;
            font-size: 1.5em;
            font-weight: bold;
            letter-spacing: 1px;
        }
        
        .nav-menu {
            display: flex;
            list-style: none;
            gap: 0;
        }
        
        .nav-menu a {
            color: white;
            text-decoration: none;
            padding: 12px 20px;
            display: block;
            transition: background-color 0.3s;
        }
        
        .nav-menu a:hover {
            background-color: rgba(255, 255, 255, 0.2);
        }
        
        .hamburger {
            display: none;
            flex-direction: column;
            cursor: pointer;
            gap: 5px;
            padding: 5px;
            background: none;
            border: none;
            z-index: 1001;
        }
        
        .hamburger span {
            width: 25px;
            height: 2px;
            background-color: white;
            border-radius: 2px;
            transition: all 0.3s ease;
            display: block;
        }
        
        .hamburger.active span:nth-child(1) {
            transform: translateY(7px) rotate(45deg);
        }
        
        .hamburger.active span:nth-child(2) {
            opacity: 0;
            transform: translateX(-10px);
        }
        
        .hamburger.active span:nth-child(3) {
            transform: translateY(-7px) rotate(-45deg);
        }
        
        @media (max-width: 768px) {
            .hamburger {
                display: flex;
            }
            
            .nav-menu {
                position: fixed;
                top: 60px;
                left: 0;
                right: 0;
                width: 100%;
                flex-direction: column;
                background-color: rgba(0, 0, 0, 0.95);
                max-height: 0;
                overflow: hidden;
                transition: max-height 0.3s ease;
                z-index: 999;
            }
            
            .nav-menu.active {
                max-height: 200px;
            }
            
            .nav-menu a {
                padding: 15px 20px;
                border-bottom: 1px solid rgba(255, 255, 255, 0.1);
                font-size: 1.1em;
            }
        }
        
        /* Page Content */
        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 40px 20px;
        }
        
        .page-content {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: auto;
        }
        
        .banner-section {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 40px 30px;
            text-align: center;
            color: white;
            border-bottom: 3px solid #667eea;
        }
        
        .banner-section h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            letter-spacing: 2px;
        }
        
        .banner-input {
            width: 100%;
            max-width: 600px;
            padding: 12px;
            font-size: 1.1em;
            border: 2px solid white;
            border-radius: 5px;
            background-color: rgba(255, 255, 255, 0.9);
            color: #333;
            margin-top: 15px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        .banner-input:focus {
            outline: none;
            background-color: white;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.2);
        }
        
        .content-section {
            padding: 40px 30px;
            flex: 1;
            overflow-y: auto;
            max-height: 500px;
        }
        
        .content-section h2 {
            color: #667eea;
            font-size: 1.8em;
            margin-bottom: 20px;
            letter-spacing: 1px;
        }
        
        .content-text {
            font-size: 1em;
            line-height: 1.6;
            color: #333;
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        
        @media (max-width: 600px) {
            .banner-section h1 {
                font-size: 1.8em;
            }
            
            .content-section {
                padding: 20px 15px;
                max-height: 400px;
            }
        }
    </style>
</head>
<body>
    <!-- Navigation Bar -->
    <nav class="navbar">
        <div class="navbar-container">
            <div class="navbar-title">Datavis</div>
            <ul class="nav-menu" id="navMenu">
                <li><a href="index.html">Home</a></li>
                <li><a href="introduction.html">Introduction</a></li>
            </ul>
            <div class="hamburger" id="hamburger" role="button" aria-label="Toggle menu">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
    </nav>
    
    <!-- Page Content -->
    <div class="container">
        <div class="page-content">
            <!-- Banner Section with Editable Header -->
            <div class="banner-section">
                <h1 id="bannerTitle">Introduction</h1>
                <input 
                    type="text" 
                    class="banner-input" 
                    id="bannerInput" 
                    placeholder="Edit banner title here..."
                    value="Introduction"
                >
            </div>
            
            <!-- Content Section with Static Text -->
            <div class="content-section">
                <div class="content-text" id="contentText">
This page is under construction.  Please check later for updates.
                </div>
            </div>
        </div>
    </div>
    
    <script>
        // Hamburger Menu Toggle
        const hamburger = document.getElementById('hamburger');
        const navMenu = document.getElementById('navMenu');
        
        function toggleMenu() {
            hamburger.classList.toggle('active');
            navMenu.classList.toggle('active');
        }
        
        // Handle click and touch events
        hamburger.addEventListener('click', toggleMenu);
        hamburger.addEventListener('touchend', function(e) {
            e.preventDefault();
            toggleMenu();
        });
        
        // Close menu when a link is clicked
        const navLinks = navMenu.querySelectorAll('a');
        navLinks.forEach(link => {
            link.addEventListener('click', () => {
                hamburger.classList.remove('active');
                navMenu.classList.remove('active');
            });
            link.addEventListener('touchend', () => {
                hamburger.classList.remove('active');
                navMenu.classList.remove('active');
            });
        });
        
        // Banner Title Editing
        const bannerTitle = document.getElementById('bannerTitle');
        const bannerInput = document.getElementById('bannerInput');
        
        bannerInput.addEventListener('input', () => {
            bannerTitle.textContent = bannerInput.value || 'Introduction';
        });
    </script>
</body>
</html>
